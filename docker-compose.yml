services:
  scrimshaw:
    build: .
    # Once the image is published, swap the line above for:
    # image: ghcr.io/tiagojct/scrimshaw:latest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      SCRIMSHAW_BASE_URL: ${SCRIMSHAW_BASE_URL:-http://localhost:8080}
      SCRIMSHAW_SESSION_SECRET: ${SCRIMSHAW_SESSION_SECRET:-}
      SCRIMSHAW_FETCH_TIMEOUT: ${SCRIMSHAW_FETCH_TIMEOUT:-30s}
    healthcheck:
      test: ["CMD", "/scrimshaw", "-healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped
